name: Deploy to Staging Simulation

on:
  workflow_run:
    workflows:
      - Publish Docker Image
    types:
      - completed
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  IMAGE_REPOSITORY: secure-notes-api

jobs:
  deploy-staging:
    name: Deploy and Smoke Test Staging
    runs-on: ubuntu-latest
    environment: staging

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Prepare image name
        run: |
          OWNER_LOWERCASE=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${OWNER_LOWERCASE}/${IMAGE_REPOSITORY}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Pull published Docker image
        run: |
          docker pull "${IMAGE_NAME}:latest"

      - name: Run staging container
        run: |
          docker run -d \
            --name secure-notes-api-staging \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e PORT=3000 \
            -e JWT_SECRET=staging-simulation-secret \
            -e JWT_EXPIRES_IN=1h \
            -e DB_FILE=/app/data/staging_simulation.sqlite \
            "${IMAGE_NAME}:latest"

      - name: Wait for staging health check
        run: |
          for i in {1..15}; do
            if curl -fsS http://localhost:3000/health; then
              echo "Staging application is healthy."
              exit 0
            fi

            echo "Waiting for staging application..."
            sleep 2
          done

          echo "Staging health check failed."
          docker logs secure-notes-api-staging
          exit 1

      - name: Run staging API smoke test
        run: |
          REGISTER_RESPONSE=$(curl -fsS -X POST http://localhost:3000/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{
              "username": "staginguser",
              "email": "staginguser@example.com",
              "password": "Password123"
            }')

          echo "Register response:"
          echo "$REGISTER_RESPONSE"

          LOGIN_RESPONSE=$(curl -fsS -X POST http://localhost:3000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{
              "email": "staginguser@example.com",
              "password": "Password123"
            }')

          TOKEN=$(python3 -c 'import sys, json; print(json.load(sys.stdin)["token"])' <<< "$LOGIN_RESPONSE")

          if [ -z "$TOKEN" ]; then
            echo "Login did not return a token."
            exit 1
          fi

          NOTE_RESPONSE=$(curl -fsS -X POST http://localhost:3000/api/notes \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -d '{
              "title": "Staging smoke test note",
              "content": "This note was created during the staging deployment smoke test."
            }')

          echo "Create note response:"
          echo "$NOTE_RESPONSE"

      - name: Show staging container logs
        if: always()
        run: |
          docker logs secure-notes-api-staging || true

      - name: Stop staging container
        if: always()
        run: |
          docker stop secure-notes-api-staging || true
          docker rm secure-notes-api-staging || true