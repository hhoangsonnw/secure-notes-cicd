name: Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPOSITORY: secure-notes-api

jobs:
  publish:
    name: Build, Test, and Publish Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image tags
        run: |
          OWNER_LOWERCASE=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)

          echo "IMAGE_NAME=ghcr.io/${OWNER_LOWERCASE}/${IMAGE_REPOSITORY}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build \
            -t "${IMAGE_NAME}:latest" \
            -t "${IMAGE_NAME}:sha-${SHORT_SHA}" \
            .

      - name: Run container for smoke test
        run: |
          docker run -d \
            --name secure-notes-api-publish-test \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e PORT=3000 \
            -e JWT_SECRET=publish-workflow-test-secret \
            -e JWT_EXPIRES_IN=1h \
            -e DB_FILE=/app/data/publish_test.sqlite \
            "${IMAGE_NAME}:sha-${SHORT_SHA}"

      - name: Wait for health check
        run: |
          for i in {1..15}; do
            if curl -fsS http://localhost:3000/health; then
              echo "Application is healthy."
              exit 0
            fi

            echo "Waiting for application to become healthy..."
            sleep 2
          done

          echo "Application health check failed."
          docker logs secure-notes-api-publish-test
          exit 1

      - name: Stop smoke test container
        if: always()
        run: |
          docker stop secure-notes-api-publish-test || true
          docker rm secure-notes-api-publish-test || true

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Push Docker image
        run: |
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:sha-${SHORT_SHA}"