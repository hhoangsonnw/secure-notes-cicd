name: Vulnerable Notes Security Demo

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan with Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare security reports directory
        run: mkdir -p security-reports

      - name: Run Gitleaks secret scan on insecure notes app
        run: |
          docker run --rm \
            -v "$(pwd):/repo" \
            zricethezav/gitleaks:latest \
            detect \
              --source="/repo/vulnerable-demo" \
              --report-format=json \
              --report-path="/repo/security-reports/gitleaks-vulnerable-notes-report.json" \
              --redact \
              || true

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-vulnerable-notes-report
          path: security-reports/gitleaks-vulnerable-notes-report.json

  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare security reports directory
        run: mkdir -p security-reports

      - name: Run Trivy filesystem scan on insecure notes app
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./vulnerable-demo
          format: table
          output: security-reports/trivy-vulnerable-notes-fs-report.txt
          severity: LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 0

      - name: Upload Trivy filesystem report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-vulnerable-notes-filesystem-report
          path: security-reports/trivy-vulnerable-notes-fs-report.txt

  trivy-image-scan:
    name: Trivy Docker Image Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare security reports directory
        run: mkdir -p security-reports

      - name: Build insecure notes image
        run: docker build -t insecure-notes-demo:trivy ./vulnerable-demo

      - name: Run Trivy image scan on insecure notes image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: insecure-notes-demo:trivy
          format: table
          output: security-reports/trivy-vulnerable-notes-image-report.txt
          vuln-type: os,library
          severity: LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 0

      - name: Upload Trivy image report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-vulnerable-notes-image-report
          path: security-reports/trivy-vulnerable-notes-image-report.txt

  zap-full-scan:
    name: OWASP ZAP Full Scan on Insecure Notes App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare security reports directory
        run: mkdir -p security-reports

      - name: Build insecure notes image
        run: docker build -t insecure-notes-demo:zap ./vulnerable-demo

      - name: Run insecure notes container
        run: |
          docker run -d \
            --name insecure-notes-demo-zap \
            -p 4000:4000 \
            insecure-notes-demo:zap

      - name: Wait for insecure notes health check
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:4000/health; then
              echo "Insecure Notes app is running."
              exit 0
            fi

            echo "Waiting for Insecure Notes app..."
            sleep 2
          done

          echo "Insecure Notes app failed to start."
          docker logs insecure-notes-demo-zap
          exit 1

      - name: Run OWASP ZAP full scan
        run: |
          docker run --rm \
            --network host \
            -v "$(pwd)/security-reports:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
              -t http://localhost:4000 \
              -r zap-vulnerable-notes-report.html \
              -w zap-vulnerable-notes-report.md \
              -J zap-vulnerable-notes-report.json \
              || true

      - name: Upload ZAP full scan report
        uses: actions/upload-artifact@v4
        with:
          name: zap-vulnerable-notes-report
          path: security-reports/

      - name: Show insecure notes container logs
        if: always()
        run: docker logs insecure-notes-demo-zap || true

      - name: Stop insecure notes container
        if: always()
        run: |
          docker stop insecure-notes-demo-zap || true
          docker rm insecure-notes-demo-zap || true